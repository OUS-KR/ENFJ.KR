<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>enfj.kr</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;min-height:100svh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#0c0905}

    /* ── background orbs: sunrise gold / coral palette ── */
    .bg-orb{position:fixed;border-radius:50%;filter:blur(105px);pointer-events:none;z-index:0}
    .bg-orb-1{width:720px;height:540px;top:-260px;left:-200px;background:radial-gradient(ellipse,rgba(200,130,30,0.20)0%,transparent70%)}
    .bg-orb-2{width:600px;height:600px;bottom:-230px;right:-170px;background:radial-gradient(ellipse,rgba(220,100,60,0.16)0%,transparent70%)}
    .bg-orb-3{width:460px;height:360px;top:-80px;right:-120px;background:radial-gradient(ellipse,rgba(240,160,40,0.13)0%,transparent70%)}
    .bg-orb-4{width:380px;height:300px;bottom:-90px;left:-80px;background:radial-gradient(ellipse,rgba(200,80,50,0.11)0%,transparent70%)}
    .bg-orb-5{width:360px;height:360px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(ellipse,rgba(255,200,80,0.07)0%,transparent70%)}
    .bg-orb-6{width:260px;height:200px;top:12%;right:8%;background:radial-gradient(ellipse,rgba(230,140,40,0.09)0%,transparent70%)}

    /* warm dawn light-field */
    body::before{
      content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:
        radial-gradient(1.2px 1.2px at  8% 15%,rgba(255,220,120,0.28) 0%,transparent 100%),
        radial-gradient(1px   1px   at 22% 70%,rgba(255,190,90,0.22)  0%,transparent 100%),
        radial-gradient(1.2px 1.2px at 40% 35%,rgba(255,210,110,0.26) 0%,transparent 100%),
        radial-gradient(1px   1px   at 58% 80%,rgba(240,170,80,0.20)  0%,transparent 100%),
        radial-gradient(1.2px 1.2px at 72% 22%,rgba(255,200,100,0.24) 0%,transparent 100%),
        radial-gradient(1px   1px   at 85% 75%,rgba(230,160,70,0.18)  0%,transparent 100%),
        radial-gradient(1px   1px   at 93% 48%,rgba(255,180,80,0.16)  0%,transparent 100%),
        radial-gradient(1px   1px   at 48% 94%,rgba(245,175,85,0.14)  0%,transparent 100%)
    }

    /* ── scene & card-wrap ── */
    .scene{perspective:900px;position:relative;z-index:1}
    .card-wrap{
      width:380px;height:240px;position:relative;
      transform-style:preserve-3d;border-radius:16px;cursor:pointer;
      animation:card-enter 1.1s cubic-bezier(.18,1,.32,1) both
    }
    @keyframes card-enter{
      from{opacity:0;transform:rotateX(-10deg) rotateY(10deg) scale(.90) translateY(20px);filter:blur(6px) brightness(1.5)}
      to  {opacity:1;transform:none;filter:none}
    }
    .card-wrap.is-idle{animation:card-enter 1.1s cubic-bezier(.18,1,.32,1) both, float-idle 8.0s ease-in-out 1.1s infinite}
    @keyframes float-idle{
      0%,100%{transform:rotateX(2deg) rotateY(-2deg) translateY(0)}
      30%    {transform:rotateX(-1.8deg) rotateY(2.5deg) translateY(-8px)}
      62%    {transform:rotateX(2.2deg) rotateY(-1.4deg) translateY(-5px)}
    }

    /* ── card base glass ── */
    .card{
      width:100%;height:100%;border-radius:16px;overflow:hidden;
      background:linear-gradient(138deg,
        rgba(220,140,40,0.20)  0%,
        rgba(180,90,30,0.10)  28%,
        rgba(235,160,55,0.17) 62%,
        rgba(200,110,40,0.12) 100%);
      backdrop-filter:blur(24px) saturate(170%) brightness(1.06);
      border:1px solid rgba(255,190,80,0.28);
      box-shadow:
        0 38px 78px rgba(10,7,3,.74),
        0 10px 24px rgba(10,7,3,.54),
        inset 0 1px 0 rgba(255,230,160,.44),
        inset 0 2px 10px rgba(220,160,50,.11),
        inset 0 -1px 0 rgba(160,70,20,.14),
        inset 0 0 58px rgba(220,140,30,.07)
    }

    /* ── holographic overlay ── */
    .card-holo{
      position:absolute;inset:0;border-radius:inherit;z-index:10;pointer-events:none;
      opacity:0;transition:opacity .40s ease;
      background:
        repeating-linear-gradient(
          calc(var(--r,120deg)),
          hsla(40, 72%,65%,.12) 0%,
          hsla(25, 70%,62%,.10) 8%,
          hsla(55, 74%,66%,.11) 16%,
          hsla(15, 68%,62%,.10) 24%,
          hsla(60, 72%,64%,.11) 32%,
          hsla(30, 70%,63%,.10) 40%,
          hsla(48, 72%,65%,.11) 48%,
          hsla(40, 72%,65%,.12) 56%,
          hsla(20, 68%,62%,.10) 64%
        ),
        radial-gradient(ellipse 52% 52% at var(--mx,50%) var(--my,50%),rgba(255,200,100,.14) 0%,transparent 62%);
      mix-blend-mode:screen
    }
    .card-wrap:hover .card-holo{opacity:1}

    /* ── warm silk texture ── */
    .card-texture{
      position:absolute;inset:0;border-radius:inherit;z-index:8;pointer-events:none;
      background-image:
        repeating-linear-gradient(55deg,  rgba(220,160,50,0) 0px,rgba(220,160,50,0) 6px,rgba(220,160,50,.014) 6px,rgba(220,160,50,.014) 7px),
        repeating-linear-gradient(-55deg, rgba(200,130,40,0) 0px,rgba(200,130,40,0) 6px,rgba(200,130,40,.010) 6px,rgba(200,130,40,.010) 7px),
        repeating-linear-gradient(0deg,   rgba(240,180,60,0) 0px,rgba(240,180,60,0) 13px,rgba(240,180,60,.008) 13px,rgba(240,180,60,.008) 14px);
      opacity:.72
    }

    /* ── edge highlight ── */
    .card-edge{
      position:absolute;inset:0;border-radius:inherit;z-index:9;pointer-events:none;
      background:
        linear-gradient(180deg,rgba(255,230,150,.48) 0px,rgba(255,230,150,0) 3px),
        linear-gradient(90deg, rgba(255,210,120,.26) 0px,rgba(255,210,120,0) 2px),
        linear-gradient(270deg,rgba(220,160,60,.16)  0px,rgba(220,160,60,0)  2px),
        linear-gradient(0deg,  rgba(150,70,20,.09)   0px,rgba(150,70,20,0)   2px)
    }

    /* ── spotlight ── */
    .card-spot{
      position:absolute;inset:0;border-radius:inherit;z-index:11;pointer-events:none;
      opacity:0;transition:opacity .22s ease;
      background:radial-gradient(ellipse 46% 46% at var(--mx,50%) var(--my,50%),rgba(255,210,110,.13) 0%,transparent 66%)
    }
    .card-wrap:hover .card-spot{opacity:1}

    /* ── shimmer sweep (5.5s) ── */
    .card-shimmer{position:absolute;inset:0;border-radius:inherit;z-index:12;pointer-events:none;overflow:hidden}
    .card-shimmer::before{
      content:"";position:absolute;top:-100%;left:-70%;width:38%;height:300%;
      background:linear-gradient(109deg,transparent 35%,rgba(255,200,90,.07) 46%,rgba(255,220,120,.13) 50%,rgba(255,200,90,.07) 54%,transparent 65%);
      transform:skewX(-9deg);
      animation:dawn-sweep 5.5s ease-in-out 1.4s infinite
    }
    .card-shimmer::after{
      content:"";position:absolute;top:-100%;left:-70%;width:18%;height:300%;
      background:linear-gradient(109deg,transparent 38%,rgba(240,170,60,.035) 48%,rgba(255,190,80,.070) 50%,rgba(240,170,60,.035) 52%,transparent 62%);
      transform:skewX(-9deg);
      animation:dawn-sweep 5.5s ease-in-out 1.85s infinite
    }
    @keyframes dawn-sweep{
      0%  {left:-70%;opacity:0}
      5%  {opacity:1}
      52% {left:130%;opacity:1}
      53% {opacity:0}
      100%{left:130%;opacity:0}
    }
    .card-wrap:hover .card-shimmer::before,
    .card-wrap:hover .card-shimmer::after{animation-play-state:paused}

    /* ── inner SVG art ── */
    .card-inner-art{position:absolute;inset:0;border-radius:inherit;z-index:6;pointer-events:none;overflow:hidden}

    /* ── dividers ── */
    .card-hline{
      position:absolute;left:24px;right:24px;bottom:52px;height:1px;z-index:14;
      background:linear-gradient(to right,transparent,rgba(220,160,50,.22) 25%,rgba(220,160,50,.22) 75%,transparent)
    }
    .card-vline{
      position:absolute;top:18%;bottom:18%;left:50%;width:1px;z-index:14;
      background:linear-gradient(to bottom,transparent,rgba(220,160,50,.16) 30%,rgba(220,160,50,.16) 70%,transparent);
      opacity:0;transition:opacity .44s ease
    }
    .card-wrap:hover .card-vline{opacity:1}

    /* ── hover meaning overlay ── */
    .card-meanings{
      position:absolute;inset:0;z-index:13;display:flex;align-items:center;justify-content:center;
      pointer-events:none;opacity:0;transition:opacity .48s ease
    }
    .card-wrap:hover .card-meanings{opacity:1}
    .meanings-row{display:flex;align-items:center;gap:0;padding:0 28px}
    .meaning-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:0 10px}
    .meaning-glyph{font-size:15px;line-height:1}
    .meaning-label{font-size:6.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,225,140,.78)}
    .meaning-sep{width:1px;height:28px;background:linear-gradient(to bottom,transparent,rgba(240,185,70,.28),transparent)}

    /* ── letter tag ── */
    .letter-tag{
      position:absolute;top:0;right:0;z-index:16;
      display:flex;flex-direction:column;align-items:center;gap:2px;
      padding:13px 11px 10px;pointer-events:none
    }
    .letter-item{display:flex;flex-direction:column;align-items:center;gap:1px}
    .letter-char{font-size:9px;font-weight:700;letter-spacing:.04em;color:rgba(255,210,110,.64)}
    .letter-word{font-size:5.5px;font-weight:400;letter-spacing:.10em;text-transform:uppercase;color:rgba(240,185,80,.34)}
    .letter-sep{width:10px;height:1px;background:rgba(220,160,50,.20);margin:1px 0}

    /* ── card content grid ── */
    .card-content{
      position:relative;z-index:15;width:100%;height:100%;
      display:grid;grid-template-columns:1fr auto;grid-template-rows:1fr auto;
      padding:22px 24px
    }
    .card-name{grid-column:1;grid-row:1;display:flex;flex-direction:column;gap:4px;align-self:start}
    .name-main{
      font-size:52px;font-weight:100;letter-spacing:.20em;
      color:rgba(255,240,210,.97);text-transform:lowercase;
      text-shadow:
        0 1px 0 rgba(255,230,160,.46),
        0 -1px 0 rgba(10,7,3,.28),
        0 0 24px rgba(240,170,50,.40),
        0 0 52px rgba(210,130,30,.20);
      filter:drop-shadow(0 0 20px rgba(230,160,40,.30))
    }
    .name-dot{color:rgba(255,185,60,.94);font-weight:200}
    .name-sub{font-size:8px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,200,90,.46)}

    .card-meta{grid-column:1;grid-row:2;display:flex;flex-direction:column;gap:4px;align-self:end;padding-bottom:2px}
    .meta-row{display:flex;align-items:center;gap:5px}
    .meta-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,185,60,.48);flex-shrink:0}
    .meta-text{font-size:8.5px;letter-spacing:.10em;text-transform:uppercase;color:rgba(255,210,120,.30)}
    .meta-text em{color:rgba(255,225,145,.58);font-style:normal;font-weight:600}

    .card-right{grid-column:2;grid-row:1/3;display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;padding-left:8px}
    .badge{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      width:34px;height:34px;border-radius:50%;
      border:1px solid rgba(255,190,70,.32);
      background:rgba(160,90,20,.09);
      backdrop-filter:blur(4px)
    }
    .badge-glyph{font-size:15px;line-height:1}
    .badge-label{font-size:5px;font-weight:600;letter-spacing:.10em;text-transform:uppercase;color:rgba(255,205,95,.44);margin-top:1px}
    .domain-url{font-size:11px;font-weight:500;letter-spacing:.14em;color:rgba(255,200,100,.52);text-transform:lowercase}
    .domain-tld{color:rgba(255,175,55,.80)}

    /* ── outward ray draw ── */
    @keyframes ray-extend{
      from{stroke-dashoffset:180}
      to  {stroke-dashoffset:0}
    }
    .sun-ray{stroke-dasharray:180;stroke-dashoffset:180;animation:ray-extend ease-out forwards}

    /* ── aura pulse ── */
    @keyframes aura-pulse{
      0%,100%{opacity:.14;r:38}
      50%    {opacity:.22;r:44}
    }

    /* ── connection node pop ── */
    @keyframes node-glow{
      0%  {opacity:0;r:0}
      60% {opacity:.9;r:4.5}
      100%{opacity:.7;r:4}
    }
    .conn-node{animation:node-glow .4s ease-out forwards;opacity:0}

    /* ── connection line draw ── */
    @keyframes conn-draw{
      from{stroke-dashoffset:200}
      to  {stroke-dashoffset:0}
    }
    .conn-line{stroke-dasharray:200;stroke-dashoffset:200;animation:conn-draw .7s ease-out forwards}

    /* ── ripple out (sound wave / influence) ── */
    @keyframes rout-expand{
      0%  {r:0;opacity:0}
      15% {opacity:.45}
      100%{opacity:.12}
    }
    .rout-c{animation:rout-expand ease-out forwards;opacity:0}

    /* ── golden particle float ── */
    .sun-particle{position:absolute;border-radius:50%;pointer-events:none;animation:sun-rise ease-out infinite}
    @keyframes sun-rise{
      0%  {transform:translate(0,0) scale(1);opacity:0}
      12% {opacity:1}
      78% {opacity:.6}
      100%{transform:translate(var(--px,4px),var(--py,-65px)) scale(.35);opacity:0}
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div class="bg-orb bg-orb-4"></div>
  <div class="bg-orb bg-orb-5"></div>
  <div class="bg-orb bg-orb-6"></div>

  <div class="scene">
    <div class="card-wrap is-idle" id="cardWrap">

      <div class="card-holo"    id="cardHolo"></div>
      <div class="card-spot"    id="cardSpot"></div>
      <div class="card-shimmer"></div>
      <div class="card-texture"></div>
      <div class="card-edge"></div>

      <div class="card" id="cardFace">

        <!-- SVG art layer -->
        <div class="card-inner-art">
          <svg width="380" height="240" viewBox="0 0 380 240" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="rg-dawn"  cx="72%" cy="52%" r="55%">
                <stop offset="0%"   stop-color="#e08820" stop-opacity=".24"/>
                <stop offset="48%"  stop-color="#9b4e08" stop-opacity=".09"/>
                <stop offset="100%" stop-color="#0c0905" stop-opacity="0"/>
              </radialGradient>
              <radialGradient id="rg-halo"  cx="72%" cy="52%" r="28%">
                <stop offset="0%"   stop-color="#ffc040" stop-opacity=".18"/>
                <stop offset="100%" stop-color="#0c0905" stop-opacity="0"/>
              </radialGradient>
              <radialGradient id="rg-warm"  cx="28%" cy="75%" r="40%">
                <stop offset="0%"   stop-color="#d06010" stop-opacity=".14"/>
                <stop offset="100%" stop-color="#0c0905" stop-opacity="0"/>
              </radialGradient>
              <linearGradient id="lg-ray" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%"   stop-color="#ffc040" stop-opacity=".60"/>
                <stop offset="100%" stop-color="#ffc040" stop-opacity="0"/>
              </linearGradient>
              <filter id="glow-g"  x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="3.5" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="glow-gs" x="-90%" y="-90%" width="280%" height="280%">
                <feGaussianBlur stdDeviation="7"   result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="blur-aura" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="6"/>
              </filter>
              <clipPath id="card-clip"><rect width="380" height="240" rx="16"/></clipPath>
            </defs>

            <g clip-path="url(#card-clip)">

              <!-- ambient fills -->
              <rect width="380" height="240" fill="url(#rg-dawn)" opacity="1"/>
              <rect width="380" height="240" fill="url(#rg-halo)" opacity="1"/>
              <rect width="380" height="240" fill="url(#rg-warm)" opacity="1"/>

              <!-- ── sun core (protagonist centre, right-mid) ── -->
              <!-- outer aura glow -->
              <circle cx="292" cy="118" r="52" fill="rgba(255,185,50,0.08)"
                      filter="url(#blur-aura)"/>
              <!-- pulsing aura ring -->
              <circle cx="292" cy="118"
                      stroke="rgba(255,190,60,0.18)" stroke-width="1.2" fill="none"
                      filter="url(#glow-g)">
                <animate attributeName="r"    values="36;44;36" dur="4.5s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values=".14;.22;.14" dur="4.5s" repeatCount="indefinite"/>
              </circle>
              <!-- inner glow ring -->
              <circle cx="292" cy="118" r="22"
                      stroke="rgba(255,200,80,0.26)" stroke-width="1.0" fill="none"
                      filter="url(#glow-g)"/>
              <!-- sun core -->
              <circle cx="292" cy="118" r="8"
                      fill="rgba(255,215,100,0.44)" filter="url(#glow-gs)"/>
              <circle cx="292" cy="118" r="4"
                      fill="rgba(255,235,160,0.70)"/>

              <!-- ── outward sun rays (18 directions) ── -->
              <g transform="translate(292,118)" filter="url(#glow-g)">
                <!-- major rays (8) -->
                <g stroke="rgba(255,200,80,0.45)" stroke-linecap="round">
                  <line class="sun-ray" x1="0"  y1="-26" x2="0"  y2="-62"  stroke-width="1.6" style="animation-delay:2.0s;animation-duration:.6s"/>
                  <line class="sun-ray" x1="18" y1="-18" x2="44" y2="-44"  stroke-width="1.4" style="animation-delay:2.1s;animation-duration:.6s"/>
                  <line class="sun-ray" x1="26" y1="0"   x2="65" y2="0"    stroke-width="1.6" style="animation-delay:2.2s;animation-duration:.6s"/>
                  <line class="sun-ray" x1="18" y1="18"  x2="44" y2="44"   stroke-width="1.4" style="animation-delay:2.3s;animation-duration:.6s"/>
                  <line class="sun-ray" x1="0"  y1="26"  x2="0"  y2="65"   stroke-width="1.6" style="animation-delay:2.4s;animation-duration:.6s"/>
                  <line class="sun-ray" x1="-18"y1="18"  x2="-44"y2="44"   stroke-width="1.4" style="animation-delay:2.5s;animation-duration:.6s"/>
                  <line class="sun-ray" x1="-26"y1="0"   x2="-65"y2="0"    stroke-width="1.6" style="animation-delay:2.6s;animation-duration:.6s"/>
                  <line class="sun-ray" x1="-18"y1="-18" x2="-44"y2="-44"  stroke-width="1.4" style="animation-delay:2.7s;animation-duration:.6s"/>
                </g>
                <!-- minor rays (8) -->
                <g stroke="rgba(255,190,70,0.28)" stroke-linecap="round">
                  <line class="sun-ray" x1="10" y1="-24" x2="22" y2="-56"  stroke-width=".9" style="animation-delay:2.85s;animation-duration:.5s"/>
                  <line class="sun-ray" x1="24" y1="-10" x2="56" y2="-22"  stroke-width=".9" style="animation-delay:2.95s;animation-duration:.5s"/>
                  <line class="sun-ray" x1="24" y1="10"  x2="56" y2="22"   stroke-width=".9" style="animation-delay:3.05s;animation-duration:.5s"/>
                  <line class="sun-ray" x1="10" y1="24"  x2="22" y2="56"   stroke-width=".9" style="animation-delay:3.15s;animation-duration:.5s"/>
                  <line class="sun-ray" x1="-10"y1="24"  x2="-22"y2="56"   stroke-width=".9" style="animation-delay:3.25s;animation-duration:.5s"/>
                  <line class="sun-ray" x1="-24"y1="10"  x2="-56"y2="22"   stroke-width=".9" style="animation-delay:3.35s;animation-duration:.5s"/>
                  <line class="sun-ray" x1="-24"y1="-10" x2="-56"y2="-22"  stroke-width=".9" style="animation-delay:3.45s;animation-duration:.5s"/>
                  <line class="sun-ray" x1="-10"y1="-24" x2="-22"y2="-56"  stroke-width=".9" style="animation-delay:3.55s;animation-duration:.5s"/>
                </g>
              </g>

              <!-- ── outward influence ripples ── -->
              <g transform="translate(292,118)">
                <circle class="rout-c" cx="0" cy="0" r="0"
                        stroke="rgba(255,190,70,0.48)" stroke-width="1.1" fill="none"
                        style="animation-delay:3.7s;animation-duration:1.4s">
                  <animate attributeName="r" from="0" to="28"  dur="1.4s" begin="3.7s" fill="freeze"/>
                  <animate attributeName="opacity" values="0;.45;.12" dur="1.4s" begin="3.7s" fill="freeze"/>
                </circle>
                <circle class="rout-c" cx="0" cy="0" r="0"
                        stroke="rgba(240,170,55,0.38)" stroke-width="0.9" fill="none"
                        style="animation-delay:4.0s;animation-duration:1.6s">
                  <animate attributeName="r" from="0" to="52"  dur="1.6s" begin="4.0s" fill="freeze"/>
                  <animate attributeName="opacity" values="0;.38;.10" dur="1.6s" begin="4.0s" fill="freeze"/>
                </circle>
                <circle class="rout-c" cx="0" cy="0" r="0"

  <script>
    const wrap = document.getElementById('cardWrap');
    const holo = document.getElementById('cardHolo');
    const spot = document.getElementById('cardSpot');

    let tX = 0, tY = 0, cX = 0, cY = 0, hovering = false;
    const lerp = (a, b, t) => a + (b - a) * t;

    (function loop() {
      cX = lerp(cX, tX, .10);
      cY = lerp(cY, tY, .10);
      wrap.style.transform = hovering
        ? `rotateX(${cX}deg) rotateY(${cY}deg) scale(1.034)`
        : `rotateX(${cX}deg) rotateY(${cY}deg)`;
      requestAnimationFrame(loop);
    })();

    wrap.addEventListener('mouseenter', () => {
      hovering = true;
      wrap.classList.remove('is-idle');
      wrap.style.animation = 'none';
      wrap.style.boxShadow =
        '0 48px 92px rgba(10,7,3,.78),' +
        '0 0 44px rgba(220,150,30,.18),' +
        '0 0 22px rgba(200,120,20,.10)';
    });
    wrap.addEventListener('mouseleave', () => {
      hovering = false;
      tX = 0; tY = 0;
      wrap.style.boxShadow = '';
      holo.style.removeProperty('--mx');
      holo.style.removeProperty('--my');
      holo.style.removeProperty('--r');
      spot.style.removeProperty('--mx');
      spot.style.removeProperty('--my');
    });
    wrap.addEventListener('mousemove', e => {
      const r  = wrap.getBoundingClientRect();
      const nx = (e.clientX - r.left - r.width  / 2) / (r.width  / 2);
      const ny = (e.clientY - r.top  - r.height / 2) / (r.height / 2);
      tY =  nx * 14;
      tX = -ny * 11;
      const px    = ((e.clientX - r.left)  / r.width  * 100).toFixed(1) + '%';
      const py    = ((e.clientY - r.top)   / r.height * 100).toFixed(1) + '%';
      const angle = (Math.atan2(ny, nx) * 180 / Math.PI + 90).toFixed(1) + 'deg';
      holo.style.setProperty('--mx', px);
      holo.style.setProperty('--my', py);
      holo.style.setProperty('--r',  angle);
      spot.style.setProperty('--mx', px);
      spot.style.setProperty('--my', py);
    });

    /* ── golden sun particles ── */
    const SUN_PARTICLES = [
      { x:'16%', s:2.2, color:'rgba(255,220,110,0.76)', dur:5.5, delay:0,   px:'8px',  py:'-62px' },
      { x:'28%', s:1.6, color:'rgba(255,200,85,0.66)',  dur:6.8, delay:0.9, px:'-10px',py:'-74px' },
      { x:'40%', s:2.0, color:'rgba(255,215,100,0.72)', dur:6.0, delay:1.8, px:'12px', py:'-55px' },
      { x:'52%', s:1.4, color:'rgba(240,185,70,0.62)',  dur:7.4, delay:0.5, px:'-7px', py:'-78px' },
      { x:'64%', s:1.8, color:'rgba(255,210,95,0.68)',  dur:5.8, delay:2.6, px:'10px', py:'-60px' },
      { x:'76%', s:1.2, color:'rgba(245,190,75,0.60)',  dur:7.8, delay:1.4, px:'-6px', py:'-68px' },
      { x:'86%', s:2.0, color:'rgba(255,205,88,0.70)',  dur:6.4, delay:3.2, px:'14px', py:'-52px' },
      { x:'22%', s:1.5, color:'rgba(255,215,102,0.64)', dur:7.0, delay:4.0, px:'-12px',py:'-70px' },
      { x:'48%', s:1.8, color:'rgba(250,200,82,0.66)',  dur:6.2, delay:2.2, px:'9px',  py:'-64px' },
      { x:'70%', s:1.4, color:'rgba(240,185,72,0.60)',  dur:8.0, delay:3.6, px:'-8px', py:'-58px' },
      { x:'34%', s:2.2, color:'rgba(255,218,108,0.68)', dur:5.6, delay:5.0, px:'6px',  py:'-72px' },
      { x:'58%', s:1.6, color:'rgba(248,195,78,0.62)',  dur:7.2, delay:1.0, px:'-11px',py:'-66px' },
    ];

    const sunCont = document.getElementById('sunContainer');
    SUN_PARTICLES.forEach(p => {
      const el = document.createElement('div');
      el.className = 'sun-particle';
      el.style.cssText = `
        left:${p.x};
        bottom:${Math.floor(Math.random() * 80 + 10)}px;
        width:${p.s}px; height:${p.s}px;
        background:${p.color};
        box-shadow: 0 0 ${p.s * 3}px ${p.color};
        --px:${p.px}; --py:${p.py};
        animation-duration:${p.dur}s;
        animation-delay:${p.delay}s;
      `;
      sunCont.appendChild(el);
    });
  </script>
